<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            color: #ff6b6b;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #4ecdc4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background-color: #45b7aa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>测试页面</h1>
        <p>如果您能看到这个页面，说明HTML文件可以正常显示。</p>
        <button onclick="alert('按钮工作正常！')">点击测试</button>
        <p>当前时间：<span id="time"></span></p>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        console.log('测试页面加载完成');
    </script>
</body>
</html>
